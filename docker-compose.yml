services:

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: vibin
      MYSQL_DATABASE: syswatch
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://root:vibin@db:3306/syswatch
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  simulator:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python simulator/fake_services.py
    environment:
      - BASE_URL=http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./backend:/app

volumes:
  mysql_data: